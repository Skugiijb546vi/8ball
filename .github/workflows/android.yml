name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: "UltimateEngine External"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # گۆڕینی جاڤا بۆ وەشانی 11 کە گونجاوە لەگەڵ پڕۆژەکەت
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    # سڕینەوەی گرەیدڵە تێکچووەکە و دروستکردنەوەی دانەیەکی نوێ
    - name: Fix and Generate Gradle Wrapper
      run: |
        rm -f gradlew gradlew.bat
        rm -rf gradle/wrapper
        gradle wrapper --gradle-version 7.3.3
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Android-App-APK
        path: "UltimateEngine External/app/build/outputs/apk/debug/*.apk"
