name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: "UltimateEngine External"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # لێرەدا ڕاستەوخۆ وەشانی ٧.٣.٣ دادەبەزێنین بۆ ئەوەی کێشە دروست نەکات
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '7.3.3'

    # ئێستا بەبێ پێویستی بە gradlew، ڕاستەوخۆ کۆدی gradle بەکاردەهێنین
    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Android-App-APK
        path: "UltimateEngine External/app/build/outputs/apk/debug/*.apk"
