name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: "UltimateEngine External"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # هەنگاوی یەکەم: هێنانی جاڤا 17 تەنها بۆ دروستکردنی فایلەکان
    - name: Set up JDK 17 (For Wrapper Generation)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix and Generate Gradle Wrapper
      run: |
        rm -f gradlew gradlew.bat
        rm -rf gradle/wrapper
        gradle wrapper --gradle-version 7.4.2
        chmod +x gradlew

    # هەنگاوی دووەم: هێنانەوەی جاڤا 11 بۆ بیڵدکردنی پڕۆژەکەی تۆ
    - name: Set up JDK 11 (For Android Build)
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Android-App-APK
        path: "UltimateEngine External/app/build/outputs/apk/debug/*.apk"
